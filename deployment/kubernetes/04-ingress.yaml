# EMBEDHUNT AI — Ingress (TLS via cert-manager). Routes the public host to the API.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: embedhunt-api
  namespace: embedhunt
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.embedhunt.ai
      secretName: embedhunt-api-tls
  rules:
    - host: api.embedhunt.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: embedhunt-api
                port:
                  number: 80
