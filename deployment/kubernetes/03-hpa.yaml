# EMBEDHUNT AI — Horizontal Pod Autoscaler: scale the API on CPU load.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: embedhunt-api
  namespace: embedhunt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: embedhunt-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
