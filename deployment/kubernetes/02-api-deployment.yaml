# EMBEDHUNT AI — API Deployment + Service. Stateless, horizontally scalable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedhunt-api
  namespace: embedhunt
  labels:
    app: embedhunt-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: embedhunt-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: embedhunt-api
    spec:
      containers:
        - name: api
          image: ghcr.io/embedhunt/embedhunt-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: embedhunt-config
            - secretRef:
                name: embedhunt-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: embedhunt-api
  namespace: embedhunt
spec:
  selector:
    app: embedhunt-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
