# EMBEDHUNT AI — reverse proxy / TLS terminator in front of the API.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Basic rate limiting to protect the API from abuse.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream embedhunt_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        client_max_body_size 10m;  # resume uploads

        location /health {
            proxy_pass http://embedhunt_api/health;
        }

        location / {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://embedhunt_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }
    }
}
